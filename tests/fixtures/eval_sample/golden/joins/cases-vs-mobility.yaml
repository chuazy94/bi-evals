id: joins-002
category: joins
difficulty: hard
question: "Compare daily new confirmed COVID-19 cases with workplace mobility changes in Singapore during 2021. Show the date, daily new cases, and workplace mobility percentage change."

expected_skill_path:
  required_skills:
    - tool: read_skill_file
      input_contains: "SKILL.md"
    - tool: read_skill_file
      input_contains: "CASE_TRACKING.md"
    - tool: read_skill_file
      input_contains: "MOBILITY_DATA.md"
    - tool: describe_table
      input_contains: "JHU_COVID_19"
    - tool: describe_table
      input_contains: "GOOG_GLOBAL_MOBILITY_REPORT"
  sequence_matters: false
  allow_extra_skills: true

reference_sql: |
  SELECT j.DATE,
         j.DIFFERENCE AS DAILY_NEW_CASES, 
         m.WORKPLACES_CHANGE_PERC AS WORKPLACE_CHANGE_PCT
  FROM COVID19_EPIDEMIOLOGICAL_DATA.PUBLIC.JHU_COVID_19 j
  INNER JOIN COVID19_EPIDEMIOLOGICAL_DATA.PUBLIC.GOOG_GLOBAL_MOBILITY_REPORT m
    ON j.COUNTRY_REGION = m.COUNTRY_REGION 
    AND j.DATE = m.DATE
  WHERE j.COUNTRY_REGION = 'Singapore'
    AND j.PROVINCE_STATE IS NULL
    AND j.CASE_TYPE = 'Confirmed'
    AND j.DATE BETWEEN '2021-01-01' AND '2021-12-31'
    ORDER BY j.DATE

expected:
  min_rows: 100
  required_columns:
    - DATE
    - DIFFERENCE
    - WORKPLACES_CHANGE_PERC
  row_comparison:
    enabled: true
    key_columns: [DATE]
    completeness_threshold: 0.8
    precision_threshold: 0.8
    value_tolerance: 0.05
    ignore_order: true

tags: [joins, mobility, cases, correlation]
notes: >
  Joins JHU_COVID_19 with GOOG_GLOBAL_MOBILITY_REPORT on COUNTRY_REGION and DATE.
  Both tables must be filtered to country-level (PROVINCE_STATE IS NULL, SUB_REGION_1 IS NULL).
  JHU uses 'US' while Google mobility may use 'United States' — agent must handle this.
  WORKPLACES values are % change from baseline (negative means below baseline).
