id: cases-002
category: cases
difficulty: easy
question: "How many new confirmed COVID-19 cases were there in the United States on 2023-01-15?"

expected_skill_path:
  required_skills:
    - tool: read_skill_file
      input_contains: "SKILL.md"
    - tool: read_skill_file
      input_contains: "CASE_TRACKING.md"
    - tool: describe_table
      input_contains: "JHU_COVID_19"
  sequence_matters: false
  allow_extra_skills: true

reference_sql: |
  SELECT sum(DIFFERENCE)AS DAILY_NEW_CASES
  FROM COVID19_EPIDEMIOLOGICAL_DATA.PUBLIC.JHU_COVID_19
  WHERE CASE_TYPE = 'Confirmed'
    AND COUNTRY_REGION = 'United States'
            AND DATE = '2023-01-15'
expected:
  min_rows: 1
  required_columns:
    - DIFFERENCE
  row_comparison:
    enabled: true
    key_columns: [DATE]
    completeness_threshold: 1.0
    precision_threshold: 1.0
    value_tolerance: 0.01
    ignore_order: true

tags: [cases, filter, us]
notes: "Tests date and country filtering. Must use DIFFERENCE (daily) not CASES (cumulative)."

# Phase 6c — known trap: agents sometimes sum CASES (cumulative) and get the
# right shape but the wrong meaning. Ban it so the violation is visible in the
# report even when the rows happen to look reasonable.
anti_patterns:
  forbidden_columns:
    - JHU_COVID_19.CASES
